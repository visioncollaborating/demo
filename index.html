<div id="lista-eventos">
  <p>Cargando eventos...</p>
</div>

<script>
  const API_URL = "https://api.sheety.co/459ca88de72b4c2d5ec973d8c1f4e4ca/demo/demo";

  async function obtenerEventos() {
    const contenedor = document.getElementById("lista-eventos");
    
    // Verificación de seguridad: si el contenedor no existe, no hacemos nada
    if (!contenedor) {
      console.error("No se encontró el elemento con id 'lista-eventos'");
      return;
    }

    try {
      const respuesta = await fetch(API_URL);
      const datos = await respuesta.json();
      
      // Según tu captura, la llave se llama "demo"
      const lista = datos.demo; 
      
      contenedor.innerHTML = ""; // Limpiamos el "Cargando..."

      lista.forEach(evento => {
        const div = document.createElement("div");
        div.innerHTML = `
          <h3>${evento.titulo || "Sin título"}</h3>
          <p><strong>Fecha:</strong> ${evento.fecha || "Sin fecha"}</p>
          <p>${evento.descripcion || ""}</p>
          <hr>
        `;
        contenedor.appendChild(div);
      });
    } catch (error) {
      console.error(error);
      contenedor.innerHTML = "Error al cargar los datos.";
    }
  }

  obtenerEventos();
</script>
