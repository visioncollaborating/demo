<script>
  const API_URL = "https://api.sheety.co/459ca88de72b4c2d5ec973d8c1f4e4ca/demo/demo";

  async function obtenerEventos() {
    try {
      const respuesta = await fetch(API_URL);
      if (!respuesta.ok) throw new Error("Error en la conexión con Sheety");
      
      const datos = await respuesta.json();
      
      // Obtenemos el primer nombre de hoja disponible en el JSON
      const nombresHoja = Object.keys(datos);
      const nombreHojaReal = nombresHoja[0]; 
      const listaEventos = datos[nombreHojaReal];
      
      console.log("Datos recibidos:", datos); // Revisa la consola para ver qué llega exactamente

      const contenedor = document.getElementById("lista-eventos");
      contenedor.innerHTML = ""; 

      listaEventos.forEach(evento => {
        const div = document.createElement("div");
        // Asegúrate de que los nombres de los campos coincidan exactamente con tus columnas
        div.innerHTML = `
          <h3>${evento.titulo || "Sin título"}</h3>
          <p><strong>Fecha:</strong> ${evento.fecha || "Sin fecha"}</p>
          <p>${evento.descripcion || ""}</p>
          <hr>
        `;
        contenedor.appendChild(div);
      });
    } catch (error) {
      console.error(error);
      document.getElementById("lista-eventos").innerHTML = "Error al cargar. Revisa la consola (F12).";
    }
  }

  obtenerEventos();
</script>
